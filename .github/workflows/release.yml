name: Release

# Triggers on pushes of tags matching vX.Y.Z (e.g. v1.0.0, v2.3.1-rc1).
# - Performs a build-only sanity check for linux/amd64 against Go 1.25.
# - Publishes a GitHub Release containing source code + a prod config.yaml
#   (no binary, no .env, no secrets).
# - Auto-generates a changelog from grouped PRs / commits since the previous tag.
# - For stable (non-prerelease) tags, additionally deploys the new release
#   to one or more production servers over SSH in parallel (one matrix leg
#   per server, configured via the SERVERS_CONFIG variable — see below).

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write   # required to create the GitHub Release and upload assets

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest
    env:
      # ---- Secrets are loaded into the runner environment one by one.
      #      None of these values are written into the release assets;
      #      they are only used to satisfy `go build` / config validation
      #      during the build step.
      SMILEYAN_BACKEND_DB_HOST: ${{ secrets.SMILEYAN_BACKEND_DB_HOST }}
      SMILEYAN_BACKEND_DB_USER: ${{ secrets.SMILEYAN_BACKEND_DB_USER }}
      SMILEYAN_BACKEND_DB_PASSWORD: ${{ secrets.SMILEYAN_BACKEND_DB_PASSWORD }}
      SMILEYAN_BACKEND_DB_NAME: ${{ secrets.SMILEYAN_BACKEND_DB_NAME }}
      SMILEYAN_BACKEND_REDIS_HOST: ${{ secrets.SMILEYAN_BACKEND_REDIS_HOST }}
      SMILEYAN_BACKEND_REDIS_USERNAME: ${{ secrets.SMILEYAN_BACKEND_REDIS_USERNAME }}
      SMILEYAN_BACKEND_REDIS_PASSWORD: ${{ secrets.SMILEYAN_BACKEND_REDIS_PASSWORD }}
      SMILEYAN_BACKEND_EMAIL_PASSWORD: ${{ secrets.SMILEYAN_BACKEND_EMAIL_PASSWORD }}
      SMILEYAN_BACKEND_JWT_SECRET: ${{ secrets.SMILEYAN_BACKEND_JWT_SECRET }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v5
        with:
          fetch-depth: 0   # full history needed for changelog generation

      - name: Print SERVERS_CONFIG (debug)
        # Surface the raw value of the SERVERS_CONFIG variable as the
        # runner sees it. Always runs (even when the variable is unset),
        # so a misconfigured variable is obvious in the log instead of
        # failing the deploy job with an opaque "fromJSON: empty input"
        # error during strategy evaluation.
        env:
          RAW: ${{ vars.SERVERS_CONFIG }}
        run: |
          echo "=== vars.SERVERS_CONFIG (raw, repr) ==="
          printf '%s\n' "${RAW:-<unset>}" | python3 -c "import sys; data=sys.stdin.read(); print(repr(data))"
          echo
          echo "=== length / line count ==="
          if [ -z "${RAW:-}" ]; then
            echo "<empty / unset>"
          else
            printf 'bytes=%d  lines=%d\n' "${#RAW}" "$(printf '%s' "$RAW" | wc -l | tr -d ' ')"
          fi

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true

      - name: Verify dependencies
        run: go mod download

      - name: Sanity build (linux/amd64)
        # The release ships a prebuilt binary; the host does not need Go
        # installed. This step also serves as a compile-time check.
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build -ldflags="-s -w" -o /tmp/smileyan-backend ./main.go
          ls -la /tmp/smileyan-backend

      - name: Prepare release assets
        # Build a minimal release/ folder containing EXACTLY three files:
        #   - smileyan-backend   the prebuilt linux/amd64 binary
        #   - deploy-remote.sh   the server-side deploy script
        #   - config.yaml        the prod config (mode: prod)
        # No source code, no dev scripts, no .env, no secrets.
        run: |
          set -e
          rm -rf release
          mkdir -p release

          # 1. Place the prebuilt binary at the root of the release dir so
          #    deploy-remote.sh can find it as ./smileyan-backend.
          mv /tmp/smileyan-backend release/smileyan-backend
          chmod +x release/smileyan-backend

          # 2. Bundle the server-side deploy script alongside the binary.
          cp scripts/deploy-remote.sh release/deploy-remote.sh
          chmod +x release/deploy-remote.sh

          # 3. Generate a prod config.yaml from the committed template.
          #    The `mode: debug` line in config.yaml is replaced with `mode: prod`.
          sed 's/mode: debug/mode: prod/' config.yaml > release/config.yaml

          # 4. Sanity check: release/ must contain exactly the 3 expected files,
          #    nothing more. Catches regressions that re-add source code.
          actual=$(ls -A1 release | sort)
          expected=$(printf '%s\n' deploy-remote.sh config.yaml smileyan-backend | sort)
          echo "release/ contents:"
          echo "$actual"
          if [ "$actual" != "$expected" ]; then
            echo "ERROR: release/ contents mismatch." >&2
            diff <(echo "$expected") <(echo "$actual") >&2
            exit 1
          fi

          # 5. Sanity check: make sure no .env is in the bundle.
          if find release -name '.env' -print -quit | grep -q .; then
            echo "ERROR: .env file leaked into the release bundle" >&2
            exit 1
          fi

          # 6. Repack as a tarball for upload.
          tar --no-xattr -czf smileyan-backend-prod.tar.gz -C release .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          # Auto-generate the release notes (grouped by PR label / commit type)
          # from the commits and PRs since the previous tag.
          generate_release_notes: true
          # Upload only the minimal prod tarball (binary + deploy script + config).
          # No source, no .env, no secrets.
          files: smileyan-backend-prod.tar.gz
          draft: false
          # Tags like v1.2.0-rc1 or v1.2.0-beta3 are flagged as pre-releases.
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') }}
          fail_on_unmatched_files: true

  deploy:
    name: Deploy to ${{ matrix.server.name }}
    # Only deploy on real release tags, never on rc/alpha/beta.
    # Mirrors the prerelease check in the release job above.
    needs: release
    if: github.event_name == 'push' && !contains(github.ref_name, '-rc') && !contains(github.ref_name, '-alpha') && !contains(github.ref_name, '-beta')
    runs-on: ubuntu-latest
    # Don't let a failed deploy silently fall through; surface it.
    continue-on-error: false
    # fail-fast: false so a single failing server doesn't cancel the others
    # mid-deploy (you usually want to see all results before intervening).
    strategy:
      fail-fast: false
      matrix:
        # SERVERS_CONFIG is a JSON array of objects, stored as a
        # **Repository Variable** (Settings -> Secrets and variables ->
        # Actions -> Variables tab), NOT as a secret. GitHub Actions
        # rejects `secrets.*` inside `strategy.matrix` because matrix
        # values are written to the workflow run log. Variables are
        # encrypted at rest but allowed in matrix expressions.
        #
        # The shared DEPLOY_SSH_KEY is reused across all servers.
        # Application-level secrets (DB/Redis/Email/JWT) are also shared
        # — they are not part of the per-server config.
        #
        # Example SERVERS_CONFIG:
        # [
        #   {
        #     "name": "prod-1",
        #     "addr": "1.2.3.4",
        #     "port": "22",
        #     "user": "deploy",
        #     "deploy_path": "/opt/smileyan-backend"
        #   },
        #   {
        #     "name": "prod-2",
        #     "addr": "5.6.7.8",
        #     "port": "2222",
        #     "user": "ubuntu",
        #     "deploy_path": "/srv/smileyan-backend"
        #   }
        # ]
        #
        # `name` is a free-form label used for log identification only.
        # It must be unique across the array. `port` is a string (per
        # scp/ssh CLI convention) but must be numeric.
        #
        # The `|| '[]'` fallback means an unset / empty SERVERS_CONFIG
        # is treated as "no servers to deploy to" and silently skips the
        # deploy job, instead of failing strategy evaluation with an
        # opaque "empty input" error. The "Print SERVERS_CONFIG (debug)"
        # step in the release job still surfaces the raw value.
        server: ${{ fromJSON(vars.SERVERS_CONFIG || '[]') }}

    steps:
      - name: Check required env vars
        # First step of the deploy job on purpose: this is a hard
        # precondition gate. We fail fast with a clear list of which
        # secrets are missing BEFORE doing any other work (checkout,
        # tarball download, ssh setup), so a misconfigured repo
        # surfaces in seconds rather than after a checkout + 5+ minutes
        # of unrelated setup. The step also does not require the repo
        # to be checked out, so it can run as the absolute first step.
        #
        # Each secret is read into a bash variable via `env:`. An
        # unconfigured secret expands to the empty string, so an empty
        # value is the "missing" signal. We previously tried the GitHub
        # Secrets API to list configured names, but the default
        # GITHUB_TOKEN returns 403 on that endpoint (it requires a PAT
        # or a token with `secrets: read` scope). The value-test
        # approach below is more reliable and doesn't need any extra
        # scopes.
        #
        # Note: SERVERS_CONFIG (the per-server deploy target list) is
        # NOT checked here. It's a Repository Variable, not a secret,
        # and the `|| '[]'` matrix fallback already handles the empty
        # case by silently skipping the deploy job. See the "Print
        # SERVERS_CONFIG (debug)" step in the release job for raw-value
        # diagnostics.
        env:
          S_DB_HOST: ${{ secrets.SMILEYAN_BACKEND_DB_HOST }}
          S_DB_USER: ${{ secrets.SMILEYAN_BACKEND_DB_USER }}
          S_DB_PASSWORD: ${{ secrets.SMILEYAN_BACKEND_DB_PASSWORD }}
          S_DB_NAME: ${{ secrets.SMILEYAN_BACKEND_DB_NAME }}
          S_REDIS_HOST: ${{ secrets.SMILEYAN_BACKEND_REDIS_HOST }}
          S_REDIS_USERNAME: ${{ secrets.SMILEYAN_BACKEND_REDIS_USERNAME }}
          S_REDIS_PASSWORD: ${{ secrets.SMILEYAN_BACKEND_REDIS_PASSWORD }}
          S_EMAIL_PASSWORD: ${{ secrets.SMILEYAN_BACKEND_EMAIL_PASSWORD }}
          S_JWT_SECRET: ${{ secrets.SMILEYAN_BACKEND_JWT_SECRET }}
          S_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          set -u
          PAIRS=(
            "SMILEYAN_BACKEND_DB_HOST|${S_DB_HOST}"
            "SMILEYAN_BACKEND_DB_USER|${S_DB_USER}"
            "SMILEYAN_BACKEND_DB_PASSWORD|${S_DB_PASSWORD}"
            "SMILEYAN_BACKEND_DB_NAME|${S_DB_NAME}"
            "SMILEYAN_BACKEND_REDIS_HOST|${S_REDIS_HOST}"
            "SMILEYAN_BACKEND_REDIS_USERNAME|${S_REDIS_USERNAME}"
            "SMILEYAN_BACKEND_REDIS_PASSWORD|${S_REDIS_PASSWORD}"
            "SMILEYAN_BACKEND_EMAIL_PASSWORD|${S_EMAIL_PASSWORD}"
            "SMILEYAN_BACKEND_JWT_SECRET|${S_JWT_SECRET}"
            "DEPLOY_SSH_KEY|${S_SSH_KEY}"
          )

          echo "=== Required env-var report ==="
          echo "An env var counts as 'OK' if its value is non-empty."
          echo "An empty value means either the secret is not configured, or"
          echo "it is configured as a Deploy Key (Settings/Keys) instead of"
          echo "an Actions secret (Settings -> Secrets and variables -> Actions)."
          echo
          printf '%-40s %s\n' 'NAME' 'STATUS'
          printf '%-40s %s\n' '----' '------'
          MISSING=()
          for pair in "${PAIRS[@]}"; do
            name="${pair%%|*}"
            val="${pair#*|}"
            if [ -n "$val" ]; then
              printf '%-40s %s\n' "$name" 'OK (non-empty)'
            else
              printf '%-40s %s\n' "$name" 'EMPTY (not accessible to this workflow)'
              MISSING+=("$name")
            fi
          done

          echo
          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "FAIL: ${#MISSING[@]} required env var(s) are not accessible:"
            printf '  - %s\n' "${MISSING[@]}"
            echo
            echo "Most likely causes:"
            echo "  1. The secret is not configured in"
            echo "     Settings -> Secrets and variables -> Actions."
            echo "  2. The secret is configured under Settings/Keys (Deploy keys)"
            echo "     which workflows cannot read. Copy the same value into a"
            echo "     repository secret with the exact name shown above."
            exit 1
          fi
          echo "All required env vars are present."

      - name: Checkout
        # Required so `gh release download` can locate the repo via .git
        # (it reads `git config --get remote.origin.url` to know which
        # release to fetch). No source code from this checkout is used.
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Download release tarball
        # Pull the tarball that the release job just published. Using
        # `gh release download` (not actions/download-artifact) because
        # the asset lives on the GitHub Release, not in the workflow's
        # artifact store.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p dist
          gh release download "${{ github.ref_name }}" \
            --pattern "smileyan-backend-prod.tar.gz" \
            --dir dist
          ls -la dist

      - name: Set up SSH key
        # Writes the private key to a file with 0600 perms and registers it
        # with ssh-agent so subsequent steps can use it transparently.
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Add server to known_hosts
        # Avoid the "host key verification failed" interactive prompt.
        # Each matrix leg has its own host:port, so this must be per-leg.
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${{ matrix.server.port }}" \
            -H "${{ matrix.server.addr }}" >> ~/.ssh/known_hosts

      - name: Upload tarball to server
        run: |
          set -e
          echo ">>> [${{ matrix.server.name }}] Uploading tarball to ${{ matrix.server.user }}@${{ matrix.server.addr }}:${{ matrix.server.port }}"
          scp -P "${{ matrix.server.port }}" dist/smileyan-backend-prod.tar.gz \
            "${{ matrix.server.user }}@${{ matrix.server.addr }}:/tmp/smileyan-backend-prod.tar.gz"

      - name: Run remote deploy script
        env:
          # The matrix value is hoisted to a named env var so the bash
          # single-quoted command body (which prevents remote expansion)
          # can still reference it.
          SERVER_NAME: ${{ matrix.server.name }}
          SERVER_DEPLOY_PATH: ${{ matrix.server.deploy_path }}
          RELEASE_TAG: ${{ github.ref_name }}
          # Application secrets forwarded to the server's shared/.env.
          # The server-side script will refuse to run if any of these
          # are empty (see the `: ${...:?}` guards in deploy-remote.sh).
          S_DB_HOST: ${{ secrets.SMILEYAN_BACKEND_DB_HOST }}
          S_DB_USER: ${{ secrets.SMILEYAN_BACKEND_DB_USER }}
          S_DB_PASSWORD: ${{ secrets.SMILEYAN_BACKEND_DB_PASSWORD }}
          S_DB_NAME: ${{ secrets.SMILEYAN_BACKEND_DB_NAME }}
          S_REDIS_HOST: ${{ secrets.SMILEYAN_BACKEND_REDIS_HOST }}
          S_REDIS_USER: ${{ secrets.SMILEYAN_BACKEND_REDIS_USERNAME }}
          S_REDIS_PASS: ${{ secrets.SMILEYAN_BACKEND_REDIS_PASSWORD }}
          S_EMAIL_PASS: ${{ secrets.SMILEYAN_BACKEND_EMAIL_PASSWORD }}
          S_JWT_SECRET: ${{ secrets.SMILEYAN_BACKEND_JWT_SECRET }}
        run: |
          set -euo pipefail

          echo ">>> [$SERVER_NAME] Extracting deploy-remote.sh from the release tarball"
          # The tarball now ships deploy-remote.sh alongside the binary, so
          # we no longer need a separate scp of scripts/deploy-remote.sh.
          # Pull it out locally first, then upload it to /tmp on the server.
          # NOTE: the file is stored with a `./` prefix inside the tarball,
          # so the extract path must include it (otherwise tar reports
          # "Not found in archive").
          mkdir -p /tmp/deploy-tools
          tar -xzf dist/smileyan-backend-prod.tar.gz -C /tmp/deploy-tools ./deploy-remote.sh
          chmod +x /tmp/deploy-tools/deploy-remote.sh

          echo ">>> [$SERVER_NAME] Uploading deploy script to /tmp/deploy-remote.sh"
          scp -P "${{ matrix.server.port }}" \
            /tmp/deploy-tools/deploy-remote.sh \
            "${{ matrix.server.user }}@${{ matrix.server.addr }}:/tmp/deploy-remote.sh"

          echo ">>> [$SERVER_NAME] Running deploy-remote.sh on the server (streaming output)"
          # All ten values are local shell variables and are inlined into
          # the remote command by the local shell. The single-quoted
          # command body prevents any further re-expansion on the server.
          ssh -p "${{ matrix.server.port }}" \
            -o ServerAliveInterval=30 -o ServerAliveCountMax=10 \
            "${{ matrix.server.user }}@${{ matrix.server.addr }}" \
            "DEPLOY_PATH='$SERVER_DEPLOY_PATH' \
             RELEASE_TAG='$RELEASE_TAG' \
             TARBALL_PATH='/tmp/smileyan-backend-prod.tar.gz' \
             S_DB_HOST='$S_DB_HOST' \
             S_DB_USER='$S_DB_USER' \
             S_DB_PASSWORD='$S_DB_PASSWORD' \
             S_DB_NAME='$S_DB_NAME' \
             S_REDIS_HOST='$S_REDIS_HOST' \
             S_REDIS_USER='$S_REDIS_USER' \
             S_REDIS_PASS='$S_REDIS_PASS' \
             S_EMAIL_PASS='$S_EMAIL_PASS' \
             S_JWT_SECRET='$S_JWT_SECRET' \
             bash -x /tmp/deploy-remote.sh"

      - name: Inspect server-side state
        env:
          SERVER_NAME: ${{ matrix.server.name }}
          SERVER_DEPLOY_PATH: ${{ matrix.server.deploy_path }}
        run: |
          echo ">>> [$SERVER_NAME] Inspecting post-deploy state"
          # Pass DEPLOY_PATH as an env var to the remote shell so the
          # single-quoted heredoc body (no $ expansion) can still use it.
          ssh -p "${{ matrix.server.port }}" \
            -o ServerAliveInterval=30 -o ServerAliveCountMax=10 \
            "${{ matrix.server.user }}@${{ matrix.server.addr }}" \
            env DEPLOY_PATH="$SERVER_DEPLOY_PATH" bash -s <<'REMOTE'
            set +e
            echo "=== DEPLOY_PATH is: [$DEPLOY_PATH] ==="
            echo
            echo "=== current symlink ==="
            ls -la "$DEPLOY_PATH/current" 2>&1 || true
            echo
            echo "=== release directory ==="
            ls -la "$DEPLOY_PATH/current/" 2>&1 || true
            echo
            echo "=== last 30 lines of app.log ==="
            tail -n 30 "$DEPLOY_PATH/current/logs/app.log" 2>&1 || true
            echo
            echo "=== process list (smileyan-backend) ==="
            ps -ef | grep -E '[s]mileyan-backend' || echo "(no smileyan-backend process)"
            echo
            echo "=== listening sockets on 8080 ==="
            (ss -ltnp 2>/dev/null || netstat -ltnp 2>/dev/null) | grep -E ':8080' || echo "(nothing on :8080)"
          REMOTE

      - name: Verify deployment
        env:
          SERVER_NAME: ${{ matrix.server.name }}
        run: |
          # Give the process a moment to bind the port.
          sleep 5
          echo ">>> [$SERVER_NAME] Running health check"
          ssh -p "${{ matrix.server.port }}" \
            -o ServerAliveInterval=30 -o ServerAliveCountMax=10 \
            "${{ matrix.server.user }}@${{ matrix.server.addr }}" \
            "curl -fsS http://127.0.0.1:8080/api/categories >/dev/null && echo '[$SERVER_NAME] Health check OK'"
